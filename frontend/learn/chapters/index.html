<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Architect's Journey — Terraform, Kubernetes, Azure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Lora:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
/*
  The Architect's Journey
  ────────────────────────
  Three chapters, each with its own visual flavor:
    - Terraform: parchment + gilded ink. The Conjurer.
    - Kubernetes: warm hive yellow. The Hivemind.
    - Azure: cathedral-blue sky and gold trim. The Great Map.
  All built on the same warm-paper substrate so they feel like one book.
*/
:root {
  --paper:     #fbf7ef;
  --ink:       #2d3a3a;
  --muted:     #6b7878;
  --line:      #d8cdb8;
  --soft-bg:   #f3ead9;
  --shadow:    0 1px 3px rgba(45,58,58,0.08), 0 8px 24px rgba(45,58,58,0.04);

  /* default accent, overridden per chapter via body[data-chapter="..."] */
  --accent:    #2c7a87;
  --warm:      #e07b3a;
  --good:      #4a9d6a;
  --bad:       #c45a4e;
  --gold:      #b48b3c;
}
body[data-chapter="terraform"]  { --accent: #8b6914; --warm: #b48b3c; --gold: #b48b3c; }
body[data-chapter="kubernetes"] { --accent: #a47c2f; --warm: #d4972f; --gold: #d4972f; }
body[data-chapter="azure"]      { --accent: #1f6f8b; --warm: #2c7a87; --gold: #b48b3c; }

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--paper); color: var(--ink);
  font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
  font-size: 17px; line-height: 1.65;
  min-height: 100vh;
}
h1, h2, h3, .display { font-family: "Lora", Georgia, serif; font-weight: 600; line-height: 1.2; }
h1 { font-size: 38px; margin: 0 0 18px; letter-spacing: -0.02em; }
h2 { font-size: 26px; margin: 36px 0 12px; }
.chapter-title { font-family: "Cinzel", "Lora", serif; letter-spacing: 0.04em; font-weight: 600; }
p  { margin: 0 0 16px; }
code, pre, .mono { font-family: "JetBrains Mono", "Consolas", monospace; font-size: 0.92em; }
a { color: var(--accent); }
button {
  font-family: inherit; font-size: 16px; font-weight: 500;
  padding: 10px 18px; border-radius: 6px; cursor: pointer;
  background: var(--accent); color: var(--paper); border: none;
  transition: filter 0.15s, transform 0.05s;
}
button:hover { filter: brightness(1.08); }
button:active { transform: translateY(1px); }
button.ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
button.ghost:hover { background: var(--soft-bg); }
button.warm { background: var(--warm); color: #fff; }
button.gold { background: var(--gold); color: #fff; }
button:disabled { opacity: 0.4; cursor: not-allowed; }

/* ─── Layout shell ──────────────────────────────────────────────────────── */
header.top {
  position: sticky; top: 0; z-index: 10;
  background: rgba(251, 247, 239, 0.94);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--line);
  padding: 12px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
header.top .home { font-family: "Cinzel", serif; font-size: 16px; font-weight: 600; color: var(--ink); text-decoration: none; }
header.top .home small { color: var(--muted); font-weight: 400; letter-spacing: 0; font-family: "Inter", sans-serif; }
.chapter-pills { display: flex; gap: 6px; }
.chapter-pills .pill {
  padding: 4px 10px; border-radius: 14px; font-size: 13px;
  border: 1px solid var(--line); background: transparent;
  color: var(--muted); cursor: pointer; transition: all 0.15s;
}
.chapter-pills .pill:hover { color: var(--ink); }
.chapter-pills .pill.active { background: var(--accent); color: var(--paper); border-color: var(--accent); }
.progress { display: flex; gap: 5px; flex-wrap: wrap; max-width: 240px; }
.progress .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--line); cursor: pointer; transition: all 0.15s; }
.progress .dot.done { background: var(--muted); }
.progress .dot.current { background: var(--accent); transform: scale(1.5); }

main { max-width: 780px; margin: 0 auto; padding: 50px 24px 140px; }
.scene { animation: fadeUp 0.5s ease-out; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.meta { color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; font-size: 11px; font-weight: 600; margin-bottom: 4px; }
.stage { margin: 28px 0; padding: 24px; border-radius: 12px; background: var(--soft-bg); box-shadow: var(--shadow); position: relative; overflow: hidden; }
.stage svg { display: block; max-width: 100%; height: auto; }

footer.bottom {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(251, 247, 239, 0.94); backdrop-filter: blur(8px);
  border-top: 1px solid var(--line);
  padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between; z-index: 10;
}
footer.bottom .counter { color: var(--muted); font-size: 14px; font-variant-numeric: tabular-nums; }

/* ─── Reusable game widgets ─────────────────────────────────────────────── */
.controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 14px; }
.controls label { color: var(--muted); font-size: 13px; }
.controls input[type=range] { accent-color: var(--accent); }
.readout { display: inline-block; background: var(--paper); padding: 4px 10px; border-radius: 4px;
           border: 1px solid var(--line); font-variant-numeric: tabular-nums; min-width: 60px; text-align: right; }
.scoreboard { display: inline-flex; gap: 16px; padding: 8px 14px; background: var(--paper); border: 1px solid var(--line);
              border-radius: 6px; font-family: "JetBrains Mono", monospace; font-size: 13px; }
.scoreboard b { color: var(--accent); }
.tip { background: rgba(180, 139, 60, 0.10); border-left: 3px solid var(--gold);
       padding: 12px 16px; margin: 16px 0; border-radius: 0 6px 6px 0; font-size: 15px; }
.tip strong { color: var(--gold); }
.story { background: var(--paper); border: 1px solid var(--line); padding: 18px 22px; margin: 20px 0;
         border-radius: 8px; font-style: italic; color: var(--muted); }
.story strong { color: var(--ink); font-style: normal; }
.choice { display: block; width: 100%; text-align: left; margin: 8px 0;
          padding: 12px 16px; background: var(--paper); border: 1px solid var(--line);
          border-radius: 6px; cursor: pointer; color: var(--ink); font-size: 15px; }
.choice:hover { border-color: var(--accent); }
.choice.correct { background: rgba(74, 157, 106, 0.12); border-color: var(--good); }
.choice.wrong   { background: rgba(196, 90, 78, 0.12); border-color: var(--bad); }
.choice .why    { display: block; margin-top: 6px; font-size: 13px; color: var(--muted); }

.timer { display: inline-block; padding: 4px 10px; background: var(--paper); border: 1px solid var(--line); border-radius: 4px;
         font-family: "JetBrains Mono", monospace; font-variant-numeric: tabular-nums; font-size: 14px; }

/* ─── Chapter splash pages ──────────────────────────────────────────────── */
.splash { padding: 60px 0; text-align: center; }
.splash .chapter-title { font-size: 48px; margin: 12px 0; }
.splash .subtitle { font-size: 18px; color: var(--muted); max-width: 540px; margin: 0 auto 32px; }
.splash .seal { width: 120px; height: 120px; margin: 0 auto 24px; }

/* ─── Tiny animations ───────────────────────────────────────────────────── */
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
@keyframes glow  { 0%,100% { box-shadow: 0 0 0 0 rgba(180, 139, 60, 0); } 50% { box-shadow: 0 0 0 10px rgba(180, 139, 60, 0); } }
.pulse { animation: pulse 0.6s ease-in-out; }
.shake { animation: shake 0.3s; }

/* Mobile */
@media (max-width: 600px) {
  h1 { font-size: 28px; }
  .splash .chapter-title { font-size: 32px; }
  main { padding: 30px 16px 120px; }
  header.top { padding: 10px 14px; flex-wrap: wrap; gap: 8px; }
  .chapter-pills { flex: 1; }
  .progress { display: none; }
}
</style>
</head>
<body data-chapter="intro">

<header class="top">
  <a class="home" href="../">
    The Architect's Journey <small>· three chapters</small>
  </a>
  <div class="chapter-pills" id="chapter-pills">
    <button class="pill" data-chapter="terraform">I · Terraform</button>
    <button class="pill" data-chapter="kubernetes">II · Kubernetes</button>
    <button class="pill" data-chapter="azure">III · Azure</button>
  </div>
  <div class="progress" id="progress"></div>
</header>

<main id="mount"></main>

<footer class="bottom">
  <button class="ghost" id="prev">← Back</button>
  <span class="counter" id="counter"></span>
  <button id="next">Next →</button>
</footer>

<script>
"use strict";

/* ─── Tiny DOM helpers ──────────────────────────────────────────────────── */
const $ = (s, r=document) => r.querySelector(s);
const SVG_NS = "http://www.w3.org/2000/svg";
const SVG_TAGS = new Set(["svg","g","rect","circle","line","path","text","defs","marker","polygon","polyline","ellipse","use","filter","stop","linearGradient","radialGradient","tspan","clipPath","foreignObject"]);
const el = (tag, attrs={}, ...kids) => {
  const isSvg = SVG_TAGS.has(tag);
  const n = isSvg ? document.createElementNS(SVG_NS, tag) : document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (v == null || v === false) continue;
    if (k === "class") n.setAttribute("class", v);
    else if (k === "style" && typeof v === "object") Object.assign(n.style, v);
    else if (k.startsWith("on") && typeof v === "function") n.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "html") n.innerHTML = v;
    else n.setAttribute(k, v);
  }
  for (const kid of kids.flat()) {
    if (kid == null) continue;
    if (typeof kid === "string") n.appendChild(document.createTextNode(kid));
    else n.appendChild(kid);
  }
  return n;
};
const wait = ms => new Promise(r => setTimeout(r, ms));
const shuffle = a => { a = a.slice(); for (let i=a.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]] = [a[j],a[i]]; } return a; };
const escapeHtml = s => String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");

/* ─── Persistence ───────────────────────────────────────────────────────── */
const SAVE = "journey.v1";
function loadState() {
  try { return JSON.parse(localStorage.getItem(SAVE) || "{}"); } catch { return {}; }
}
function saveState(s) {
  try { localStorage.setItem(SAVE, JSON.stringify(s)); } catch {}
}

/* ─── Scene registry ────────────────────────────────────────────────────── */
const scenes = [];
function defineScene(spec) { scenes.push(spec); }

let currentIdx = 0;
let cleanupCurrent = null;

function setChapter(name) {
  document.body.dataset.chapter = name;
  document.querySelectorAll(".chapter-pills .pill").forEach(p => {
    p.classList.toggle("active", p.dataset.chapter === name);
  });
}

function renderScene(idx) {
  if (cleanupCurrent) { try { cleanupCurrent(); } catch {} cleanupCurrent = null; }
  currentIdx = Math.max(0, Math.min(scenes.length-1, idx));
  const s = loadState(); s.scene = currentIdx; saveState(s);
  const scene = scenes[currentIdx];
  setChapter(scene.chapter || "intro");
  const mount = $("#mount");
  mount.innerHTML = "";
  const root = el("div", { class: "scene" });
  cleanupCurrent = scene.render(root) || null;
  mount.appendChild(root);
  window.scrollTo({ top: 0, behavior: "smooth" });
  updateChrome();
}
function updateChrome() {
  // Dots show progress WITHIN current chapter only
  const cur = scenes[currentIdx];
  const sameChapter = scenes.map((s,i) => ({s, i})).filter(({s}) => s.chapter === cur.chapter);
  const myIdxInChapter = sameChapter.findIndex(({i}) => i === currentIdx);
  const dots = $("#progress");
  dots.innerHTML = "";
  sameChapter.forEach(({i}, k) => {
    const dot = el("span", {
      class: "dot" + (k < myIdxInChapter ? " done" : "") + (k === myIdxInChapter ? " current" : ""),
      onclick: () => renderScene(i),
    });
    dots.appendChild(dot);
  });
  $("#prev").disabled = currentIdx === 0;
  $("#next").textContent = currentIdx === scenes.length-1 ? "Done ✓" : "Next →";
  $("#counter").textContent = `${currentIdx+1} / ${scenes.length}`;
}

document.querySelectorAll(".chapter-pills .pill").forEach(p => {
  p.addEventListener("click", () => {
    const ch = p.dataset.chapter;
    const idx = scenes.findIndex(s => s.chapter === ch);
    if (idx >= 0) renderScene(idx);
  });
});

$("#prev").addEventListener("click", () => renderScene(currentIdx-1));
$("#next").addEventListener("click", () => renderScene(currentIdx+1));
window.addEventListener("keydown", e => {
  if (["INPUT","TEXTAREA"].includes(e.target.tagName)) return;
  if (e.key === "ArrowRight") renderScene(currentIdx+1);
  if (e.key === "ArrowLeft")  renderScene(currentIdx-1);
});

/* =====================================================================
   SCENES
   The remainder of the script defines each scene. We keep the order
   strictly linear (intro → ch1 → ch2 → ch3 → outro) so the prev/next
   navigation matches the narrative flow, but the chapter pills can
   jump to the start of any chapter directly.
   ===================================================================== */

/* ═════════════════════════════════════════════════════════════════════════
   INTRO
   ═════════════════════════════════════════════════════════════════════════ */

defineScene({
  chapter: "intro",
  render(root) {
    root.appendChild(el("div", { class: "splash" },
      el("svg", { class: "seal", viewBox: "0 0 120 120" },
        el("circle", { cx: 60, cy: 60, r: 56, fill: "#fbf7ef", stroke: "#b48b3c", "stroke-width": 2 }),
        el("circle", { cx: 60, cy: 60, r: 50, fill: "none", stroke: "#b48b3c", "stroke-width": 1, opacity: 0.5 }),
        el("text", { x: 60, y: 50, "text-anchor": "middle", "font-family": "Cinzel", "font-size": 16, fill: "#8b6914" }, "I · II · III"),
        el("text", { x: 60, y: 78, "text-anchor": "middle", "font-family": "Lora", "font-size": 11, fill: "#6b7878" }, "ARCHITECT")
      ),
      el("div", { class: "meta" }, "An interactive journey"),
      el("h1", { class: "chapter-title" }, "The Architect's Journey"),
      el("p", { class: "subtitle", html:
        "Three crafts power most of the internet you touch each day. " +
        "<b>Terraform</b> describes worlds into being. <b>Kubernetes</b> keeps them alive. <b>Azure</b> is the ground they stand on. " +
        "This is not a course. It's a series of little games — one for every important idea — designed to let you " +
        "<em>feel</em> what these tools do, not just read about them."
      }),
      el("button", { onclick: () => renderScene(currentIdx + 1) }, "Begin the journey")
    ));

    root.appendChild(el("div", { class: "story", html:
      "<strong>The format.</strong> Each chapter has its own flavor. You'll be asked to make choices, drag pieces, " +
      "race timers, and break things on purpose. Don't worry about getting things wrong — that's how the games work. " +
      "Use the arrow keys, or the Next button below."
    }));
  },
});

/* ═════════════════════════════════════════════════════════════════════════
   CHAPTER I — TERRAFORM: THE CONJURER
   Theme: a wizard's spellbook. Infrastructure is conjured from words.
   Color: gilded ink on parchment.
   ═════════════════════════════════════════════════════════════════════════ */

defineScene({
  chapter: "terraform",
  render(root) {
    root.appendChild(el("div", { class: "splash" },
      el("svg", { class: "seal", viewBox: "0 0 120 120" },
        el("circle", { cx: 60, cy: 60, r: 56, fill: "#fbf7ef", stroke: "#8b6914", "stroke-width": 2 }),
        el("path", { d: "M 60 25 L 75 50 L 95 55 L 80 72 L 84 95 L 60 83 L 36 95 L 40 72 L 25 55 L 45 50 Z",
                     fill: "#b48b3c", opacity: 0.8 }),
        el("text", { x: 60, y: 113, "text-anchor": "middle", "font-family": "Cinzel", "font-size": 9, fill: "#8b6914" }, "I · TERRAFORM")
      ),
      el("div", { class: "meta" }, "Chapter I"),
      el("h1", { class: "chapter-title" }, "The Conjurer"),
      el("p", { class: "subtitle", html:
        "Once, building a server meant flicking switches in a humming basement. Then, clicking through hundreds of web forms. " +
        "Now we <em>write down what we want</em>, and the cloud bends. This chapter is the spellbook."
      }),
      el("button", { onclick: () => renderScene(currentIdx + 1) }, "Open the book")
    ));
  },
});

/* ─── 1.1 — A short history of building things ──────────────────────────── */
defineScene({
  chapter: "terraform",
  render(root) {
    root.appendChild(el("div", { class: "meta" }, "Chapter I · 1"));
    root.appendChild(el("h1", { class: "chapter-title" }, "Before the spellbook"));

    root.appendChild(el("div", { class: "story", html:
      "<strong>Babylon, circa 1750 BCE.</strong> Hammurabi's stonemasons receive a clay tablet. " +
      "On it, in cuneiform: <em>a temple, three stories, this many cubits, with two stairways</em>. " +
      "The tablet is the design. The masons execute it. If the temple is wrong, the tablet is wrong, " +
      "and you can read the tablet and find out. The first 'infrastructure as code' is 3,700 years old."
    }));

    root.appendChild(el("p", { html:
      "For most of computing history we did the opposite. To build a server, a human SSHed in and typed commands. " +
      "To make a second server, a human typed those commands again, possibly forgetting one. To make a hundred, the human cried."
    }));

    // Visual: clay tablet → terminal → terraform plan
    const stage = el("div", { class: "stage" });
    stage.innerHTML = `
      <svg viewBox="0 0 720 220" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(40, 60)">
          <rect width="160" height="120" rx="14" fill="#d4b787" stroke="#8b6914" stroke-width="2"/>
          <line x1="20" y1="30" x2="140" y2="30" stroke="#8b6914" stroke-width="1.5"/>
          <line x1="20" y1="50" x2="120" y2="50" stroke="#8b6914" stroke-width="1.5"/>
          <line x1="20" y1="70" x2="130" y2="70" stroke="#8b6914" stroke-width="1.5"/>
          <line x1="20" y1="90" x2="110" y2="90" stroke="#8b6914" stroke-width="1.5"/>
          <text x="80" y="-8" text-anchor="middle" font-family="Lora" font-size="13" fill="#6b7878">1750 BCE</text>
          <text x="80" y="200" text-anchor="middle" font-family="Inter" font-size="12" fill="#6b7878">clay tablet · cuneiform plan</text>
        </g>
        <g transform="translate(280, 60)">
          <rect width="160" height="120" rx="6" fill="#1a1a1a"/>
          <text x="14" y="28" font-family="JetBrains Mono" font-size="11" fill="#9bcd9b">$ ssh server1</text>
          <text x="14" y="48" font-family="JetBrains Mono" font-size="11" fill="#9bcd9b">$ apt install nginx</text>
          <text x="14" y="68" font-family="JetBrains Mono" font-size="11" fill="#9bcd9b">$ vim /etc/...</text>
          <text x="14" y="88" font-family="JetBrains Mono" font-size="11" fill="#fcc"      >$ ssh server2</text>
          <text x="14" y="108" font-family="JetBrains Mono" font-size="11" fill="#fcc"     >$ ...crying...</text>
          <text x="80" y="-8"  text-anchor="middle" font-family="Lora" font-size="13" fill="#6b7878">2000s</text>
          <text x="80" y="200" text-anchor="middle" font-family="Inter" font-size="12" fill="#6b7878">imperative · by hand</text>
        </g>
        <g transform="translate(520, 60)">
          <rect width="160" height="120" rx="6" fill="#fff" stroke="#b48b3c" stroke-width="2"/>
          <text x="14" y="28" font-family="JetBrains Mono" font-size="11" fill="#2d3a3a">resource "aks" {</text>
          <text x="14" y="48" font-family="JetBrains Mono" font-size="11" fill="#2d3a3a">  nodes  = 3</text>
          <text x="14" y="68" font-family="JetBrains Mono" font-size="11" fill="#2d3a3a">  region = "eastus"</text>
          <text x="14" y="88" font-family="JetBrains Mono" font-size="11" fill="#2d3a3a">}</text>
          <text x="14" y="108" font-family="JetBrains Mono" font-size="11" fill="#b48b3c">$ terraform apply</text>
          <text x="80" y="-8"  text-anchor="middle" font-family="Lora" font-size="13" fill="#6b7878">today</text>
          <text x="80" y="200" text-anchor="middle" font-family="Inter" font-size="12" fill="#6b7878">declarative · by spell</text>
        </g>
        <line x1="200" y1="120" x2="280" y2="120" stroke="#9aa8b2" stroke-width="2" marker-end="url(#arr)"/>
        <line x1="440" y1="120" x2="520" y2="120" stroke="#9aa8b2" stroke-width="2" marker-end="url(#arr)"/>
        <defs>
          <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M0,0 L10,5 L0,10 Z" fill="#9aa8b2"/>
          </marker>
        </defs>
      </svg>
    `;
    root.appendChild(stage);

    root.appendChild(el("p", { html:
      "Terraform is the third stone in this lineage: you describe what you want in a text file, and the tool reconciles " +
      "the world with the description. It doesn't matter how many servers you want — one or one thousand — the spellbook is the same."
    }));
  },
});

/* ─── 1.2 — GAME: Provisioning Race (click-ops vs Terraform) ────────────── */
defineScene({
  chapter: "terraform",
  render(root) {
    root.appendChild(el("div", { class: "meta" }, "Chapter I · 2 · A small game"));
    root.appendChild(el("h1", { class: "chapter-title" }, "The Provisioning Race"));
    root.appendChild(el("p", { html:
      "To convince you why this matters, a race. You're the operator. You need to provision <b>10 servers</b>. " +
      "On the left: the click-ops way — you literally have to click through ten setup wizards. On the right: " +
      "you write the spell once and let Terraform apply it ten times."
    }));

    const stage = el("div", { class: "stage" });
    stage.innerHTML = `
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div>
          <div class="display" style="font-size:18px; margin-bottom:8px;">Click-ops</div>
          <div style="font-size:13px; color:var(--muted); margin-bottom:12px;">Click <b>Provision</b> 10 times.<br>Each click takes a moment — wizards have <em>so many</em> steps.</div>
          <div id="clicks-left" style="font-family:JetBrains Mono, monospace; font-size:14px; margin-bottom:8px;">10 to go</div>
          <button id="click-btn">Provision a server</button>
          <div id="click-timer" class="timer" style="margin-top:14px;">0.0 s</div>
        </div>
        <div>
          <div class="display" style="font-size:18px; margin-bottom:8px;">Terraform</div>
          <div style="font-size:13px; color:var(--muted); margin-bottom:12px;">Press once — but the apply runs the spell 10×.</div>
          <div id="tf-status" style="font-family:JetBrains Mono, monospace; font-size:14px; margin-bottom:8px;">idle</div>
          <button id="tf-btn">terraform apply</button>
          <div id="tf-timer" class="timer" style="margin-top:14px;">0.0 s</div>
        </div>
      </div>
      <div id="race-result" class="tip" style="display:none; margin-top:24px;"></div>
    `;
    root.appendChild(stage);

    let clicksLeft = 10;
    let clickT0 = null, clickInterval = null, clickEnd = null;
    const clickBtn = stage.querySelector("#click-btn");
    const clickStatus = stage.querySelector("#clicks-left");
    const clickTimer = stage.querySelector("#click-timer");
    clickBtn.addEventListener("click", () => {
      if (clickT0 === null) { clickT0 = performance.now(); clickInterval = setInterval(() => {
        const e = clickEnd ?? performance.now();
        clickTimer.textContent = ((e - clickT0)/1000).toFixed(1) + " s";
      }, 50); }
      clickBtn.disabled = true;
      // simulate a "wizard click" with a delay
      setTimeout(() => {
        clicksLeft--;
        clickStatus.textContent = clicksLeft === 0 ? "✓ all 10 provisioned" : `${clicksLeft} to go`;
        if (clicksLeft <= 0) {
          clickEnd = performance.now();
          clickBtn.textContent = "✓ done";
          clearInterval(clickInterval);
          clickTimer.textContent = ((clickEnd - clickT0)/1000).toFixed(1) + " s";
        } else {
          clickBtn.disabled = false;
        }
        checkResult();
      }, 700);
    });

    let tfT0 = null, tfInterval = null, tfEnd = null;
    const tfBtn = stage.querySelector("#tf-btn");
    const tfStatus = stage.querySelector("#tf-status");
    const tfTimer = stage.querySelector("#tf-timer");
    tfBtn.addEventListener("click", async () => {
      tfBtn.disabled = true;
      tfT0 = performance.now();
      tfInterval = setInterval(() => {
        const e = tfEnd ?? performance.now();
        tfTimer.textContent = ((e - tfT0)/1000).toFixed(1) + " s";
      }, 50);
      const lines = [
        "Plan: 10 to add, 0 to change, 0 to destroy.",
        "Applying...",
        "  ✓ server[0] creating",
        "  ✓ server[1] creating",
        "  ✓ server[2,3,4] creating (parallel)",
        "  ✓ server[5..9] creating (parallel)",
        "Apply complete! Resources: 10 added.",
      ];
      for (const ln of lines) { tfStatus.textContent = ln; await wait(420); }
      tfEnd = performance.now();
      clearInterval(tfInterval);
      tfTimer.textContent = ((tfEnd - tfT0)/1000).toFixed(1) + " s";
      checkResult();
    });

    function checkResult() {
      if (clicksLeft > 0 || tfEnd === null) return;
      const clickTime = (clickEnd - clickT0) / 1000;
      const tfTime    = (tfEnd - tfT0) / 1000;
      const msg = stage.querySelector("#race-result");
      msg.style.display = "";
      msg.innerHTML = `<strong>The point:</strong> click-ops took ~${clickTime.toFixed(1)}s for 10 servers; Terraform took ~${tfTime.toFixed(1)}s for the same 10 (and it runs them in parallel). Now imagine <em>1,000 servers</em>. The Terraform line is the same. The click line is a person not coming home for a week.`;
    }
  },
});

/* ─── 1.3 — GAME: Spellbuilder (drag & drop a resource) ─────────────────── */
defineScene({
  chapter: "terraform",
  render(root) {
    root.appendChild(el("div", { class: "meta" }, "Chapter I · 3 · The Spellbuilder"));
    root.appendChild(el("h1", { class: "chapter-title" }, "Conjure a database"));
    root.appendChild(el("p", { html:
      "Drag the missing pieces into the spell. Each slot expects a particular shape — region must be a region, size must be a size. " +
      "When it's complete, press <b>Cast</b>."
    }));

    const stage = el("div", { class: "stage" });
    stage.innerHTML = `
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:24px; align-items:start;">
        <div>
          <div class="display" style="font-size:14px; color:var(--muted); margin-bottom:8px;">your spell</div>
          <pre style="background:var(--paper); padding:16px; border:1px solid var(--line); border-radius:8px; font-family:JetBrains Mono, monospace; font-size:13px; line-height:1.7; margin:0; white-space:pre;">resource "azurerm_postgres" "main" {

  size     = "<span class="slot" data-want="size">    drop size     </span>"

}</pre>
          <button id="cast" style="margin-top:14px;" disabled>Cast the spell</button>
        </div>
        <div>
          <div class="display" style="font-size:14px; color:var(--muted); margin-bottom:8px;">tokens (drag onto slots)</div>

      </div>

    `;
    root.appendChild(stage);

    // Style slots inline (since they're in a <pre>)
    stage.querySelectorAll(".slot").forEach(sl => {
      sl.style.cssText = "display:inline-block; min-width:140px; padding:2px 6px; border:1px dashed #b48b3c; border-radius:3px; background:#fff5e6; color:#8b6914; cursor:default;";
    });

    const tokens = [
      { id: "db-prod",   want: "name",   bad: false },
      { id: "eastus",    want: "region", bad: false },
      { id: "GP_4cpu",   want: "size",   bad: false },
      { id: "true",      want: "backup", bad: false },
      { id: "Mars",      want: "region", bad: true  },
      { id: "yes-please", want: "backup", bad: true },
      { id: "0xCAFE",     want: "size",   bad: true },
    ];

    const tokensWrap = stage.querySelector("#tokens");
    const ts = shuffle(tokens);
    for (const t of ts) {
      const chip = el("button", {
        class: "ghost",
        draggable: true,
        style: { padding: "6px 12px", fontFamily: "JetBrains Mono, monospace", fontSize: "13px" },
      }, t.id);
      chip.dataset.want = t.want;
      chip.dataset.bad = t.bad ? "1" : "";
      chip.addEventListener("dragstart", e => { e.dataTransfer.setData("text/plain", t.id); e.dataTransfer.effectAllowed = "move"; });
      // Allow clicking as well: pick a token, then click a slot
      chip.addEventListener("click", () => {
        document.querySelectorAll("#tokens button").forEach(b => b.style.outline = "");
        chip.style.outline = "2px solid var(--accent)";
        selectedToken = t;
      });
      tokensWrap.appendChild(chip);
    }

    let selectedToken = null;

    function placeOnSlot(slot, token) {
      if (slot.dataset.want !== token.want) {
        slot.style.background = "rgba(196,90,78,0.15)"; slot.style.borderColor = "#c45a4e";
        setTimeout(() => { slot.style.background = "#fff5e6"; slot.style.borderColor = "#b48b3c"; }, 600);
        return;
      }
      if (token.bad) {
        slot.style.background = "rgba(196,90,78,0.15)"; slot.style.borderColor = "#c45a4e";
        slot.textContent = token.id + " — nonsense for this field";
        return;
      }
      slot.style.background = "rgba(74,157,106,0.15)"; slot.style.borderColor = "#4a9d6a"; slot.style.color = "#2d3a3a";
      slot.textContent = token.id;
      slot.dataset.filled = "1";
      checkComplete();
    }

    stage.querySelectorAll(".slot").forEach(slot => {
      slot.addEventListener("dragover", e => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; });
      slot.addEventListener("drop", e => {
        e.preventDefault();
        const id = e.dataTransfer.getData("text/plain");
        const tok = tokens.find(t => t.id === id);
        if (tok) placeOnSlot(slot, tok);
      });
      slot.addEventListener("click", () => {
        if (selectedToken) {
          placeOnSlot(slot, selectedToken);
          // de-highlight all tokens
          document.querySelectorAll("#tokens button").forEach(b => b.style.outline = "");
          selectedToken = null;
        }
      });
    });

    function checkComplete() {
      const all = [...stage.querySelectorAll(".slot")].every(s => s.dataset.filled);
      stage.querySelector("#cast").disabled = !all;
    }

    stage.querySelector("#cast").addEventListener("click", async () => {
      const result = stage.querySelector("#result");
      result.style.display = "";
      result.innerHTML = `<strong>Casting...</strong> reading spell · validating · planning...`;
      await wait(700);
      result.innerHTML = `<strong>Plan:</strong> 1 to add. <em>Applying...</em>`;
      await wait(900);
      result.innerHTML = `<strong>✨ Apply complete.</strong> A PostgreSQL Flexible Server now exists in Azure, " +
        "with the exact shape you spelled. Run the same spell tomorrow on a different subscription — same database. ` +
        `That's the magic: <em>the description IS the deploy</em>.`;
    });

    root.appendChild(el("p", { html:
      "<b>Notice:</b> the spell doesn't say <em>how</em> to build the database — what API to call, in what order. " +
      "It describes <em>what you want to exist</em>. Terraform figures out the rest. We call this <em>declarative</em>. " +
      "It's the same shift from 'click these 50 buttons' to 'these are the buttons I want pressed.'"
    }));
  },
});

defineScene({
  chapter: "terraform",
  render(root) {

      "Look at each change and predict the outcome."
    }));

    const puzzles = [
      {
        before: 'resource "vm" "web" {\n  name = "web-1"\n  size = "Standard_D2"\n}',
        after:  'resource "vm" "web" {\n  name = "web-1"\n  size = "Standard_D2"\n  tags = { team = "platform" }\n}',

        choices: [
          { text: "Update in place (no downtime)",   right: true,  why: "Tags are metadata. The VM stays, just gains a label." },
          { text: "Destroy and recreate (downtime)", right: false, why: "Tags don't touch the underlying compute. Look for changes to fields that define the resource itself, like 'size' or 'image'." },
          { text: "Nothing — no change",             right: false, why: "There IS a change (new tag), it's just a small one." },
        ],
      },
      {
        before: 'resource "vm" "web" {\n  name = "web-1"\n  size = "Standard_D2"\n  zone = "1"\n}',
        after:  'resource "vm" "web" {\n  name = "web-1"\n  size = "Standard_D2"\n  zone = "2"\n}',
        question: "Move the VM from availability zone 1 to zone 2. What happens?",

          { text: "Destroy and recreate",               right: true,  why: "Zone is a 'force-new' attribute — changing it requires recreation. In prod, that means downtime. Terraform shows this in red in the plan." },
          { text: "Update tags only",                   right: false, why: "We didn't change tags. We changed something that requires physically moving the VM." },
        ],
      },
      {
        before: 'resource "db" "main" {\n  size = "GP_4cpu"\n  storage_gb = 100\n}',

          { text: "Destroy and recreate (data loss!)", right: false, why: "If you saw this in a plan, STOP. But for storage_gb specifically, Azure PostgreSQL supports in-place growth." },
        ],
      },

        question: "Rename the storage account from 'filescdn' to 'filescdn-v2'.",

          { text: "Destroy and recreate (data loss!)",  right: true,  why: "Yep. The OLD account (including its blobs!) is deleted. ALWAYS read the plan for storage/database renames before applying." },

          }),

/* ─── 1.6 — GAME: Order of Destruction ─────────────────────────────────── */
defineScene({
  chapter: "terraform",
  render(root) {
    root.appendChild(el("div", { class: "meta" }, "Chapter I · 6 · A small game"));
    root.appendChild(el("h1", { class: "chapter-title" }, "Order of destruction"));
    root.appendChild(el("p", { html:
      "Time to tear down a stack. <em>You can't delete things in any order</em> — most cloud resources depend on others. " +
      "You can't delete a VNet while there's still a VM in it. You can't delete a Key Vault while a service is trying to read from it."
    }));
    root.appendChild(el("p", { html:
      "Click resources in the order Terraform would delete them. (Hint: leaves first, roots last.)"
    }));

    const stage = el("div", { class: "stage" });
    // Define a tiny dependency graph:
    //   Resource Group (RG)
    //     └── VNet
    //          └── Subnet
    //               └── AKS Cluster
    //                    └── Pods (logical)
    //     └── Postgres
    //     └── Key Vault
    // Correct order: delete from the leaves: AKS first (it depends on Subnet, which depends on VNet),
    // then Postgres, then Key Vault, then Subnet, then VNet, then RG.
    const items = [
      { id: "aks",       label: "AKS Cluster",      deps: ["subnet"], order: 0 },
      { id: "postgres",  label: "PostgreSQL",       deps: ["rg"],     order: 1 },
      { id: "keyvault",  label: "Key Vault",        deps: ["rg"],     order: 2 },
      { id: "subnet",    label: "Subnet",           deps: ["vnet"],   order: 3 },
      { id: "vnet",      label: "VNet",             deps: ["rg"],     order: 4 },
      { id: "rg",        label: "Resource Group",   deps: [],         order: 5 },
    ];
    const deleted = new Set();
    let step = 0;
    let mistakes = 0;

    function canDelete(id) {
      // Can delete if nothing not-yet-deleted points to me
      return !items.some(it => !deleted.has(it.id) && it.deps.includes(id) && id !== it.id);
    }

    const board = el("div", { style: { display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: "12px", marginBottom: "16px" } });
    function renderBoard() {
      board.innerHTML = "";
      for (const it of items) {
        const can = canDelete(it.id) && !deleted.has(it.id);
        const isDeleted = deleted.has(it.id);
        const btn = el("button", {
          class: "ghost",
          style: {
            padding: "16px", fontFamily: "Lora, serif", fontSize: "15px",
            opacity: isDeleted ? "0.3" : (can ? "1" : "0.85"),
            background: isDeleted ? "#f3ead9" : (can ? "rgba(180, 139, 60, 0.08)" : "#fff"),
            textDecoration: isDeleted ? "line-through" : "none",
            cursor: isDeleted ? "default" : "pointer",
          },
          onclick: () => attemptDelete(it),
        }, it.label,
           isDeleted ? null : el("div", { style: { fontSize: "11px", color: "var(--muted)", marginTop: "4px" } },
             it.deps.length ? `depends on: ${it.deps.join(", ")}` : "no deps"));
        board.appendChild(btn);
      }
    }

    const log = el("div", { class: "tip" , html: "Click a resource to try to delete it. You can only delete things nothing else depends on." });

    function attemptDelete(it) {
      if (deleted.has(it.id)) return;
      if (!canDelete(it.id)) {
        mistakes++;
        log.innerHTML = `<strong>Can't delete ${it.label}:</strong> something still depends on it. Try a leaf first.`;
        log.style.borderLeftColor = "var(--bad)";
        return;
      }
      deleted.add(it.id);
      step++;
      log.innerHTML = `<strong>${it.label} destroyed.</strong> ${items.length - step} resources remaining.`;
      log.style.borderLeftColor = "var(--good)";
      renderBoard();
      if (deleted.size === items.length) {
        log.innerHTML = `<strong>✓ Stack destroyed in correct order.</strong> Mistakes: ${mistakes}.<br>` +
          `<em>${mistakes === 0 ? "Flawless. Terraform would have done exactly this — it computes a destroy plan that walks the dependency graph leaves-first."
                                : "You stumbled a few times — that's fine, because Terraform doesn't! It builds the dependency graph automatically and walks it the right way."}</em>`;
      }
    }

    stage.appendChild(board);
    stage.appendChild(log);
    renderBoard();
    root.appendChild(stage);

    root.appendChild(el("p", { html:
      "<b>The lesson:</b> Terraform doesn't just track <em>what</em> exists, it tracks the <em>graph</em> of how things depend on each other. " +
      "When you apply, it walks the graph from roots to leaves. When you destroy, it walks the same graph in reverse. " +
      "You never have to think about delete order — but understanding why one exists makes the tool less magical, more comprehensible."
    }));
  },
});

/* ─── 2.2 — GAME: Pod Whack-a-Mole (self-healing) ───────────────────────── */
defineScene({
  chapter: "kubernetes",
  render(root) {
    root.appendChild(el("div", { class: "meta" }, "Chapter II · 2 · A small game"));
    root.appendChild(el("h1", { class: "chapter-title" }, "Whack the bees"));
    root.appendChild(el("p", { html:
      "Your job: kill pods. Their job: come back. The hive controller is asked to keep 8 pods running at all times. " +
      "Click any pod to take it down. Watch what happens. Try to keep the hive empty for 5 seconds. (You won't be able to.)"
    }));

    const stage = el("div", { class: "stage" });
    stage.innerHTML = `
      <div class="scoreboard" style="margin-bottom: 16px;">
        <span>Kills: <b id="kills">0</b></span>
        <span>Empty for: <b id="empty-time">0.0s</b></span>
        <span>Best emptiness: <b id="best">0.0s</b></span>
      </div>
      <svg viewBox="0 0 720 240" xmlns="http://www.w3.org/2000/svg" id="hive-svg"></svg>
      <div class="tip" id="hive-tip" style="margin-top:16px;">
        Click any pod to terminate it. The controller will notice within a second and start a replacement.
      </div>
    `;
    root.appendChild(stage);

    const svg = stage.querySelector("#hive-svg");
    const N = 8;
    const pods = []; // { id, alive, dyingUntil, x, y }
    let kills = 0;
    let bestEmpty = 0;
    let emptyStartedAt = null;
    let stopLoop = false;

    function placePod(i) {
      const x = (i % 4) * 170 + 40;
      const y = Math.floor(i / 4) * 110 + 20;
      return { x, y };
    }

    for (let i = 0; i < N; i++) {
      const { x, y } = placePod(i);
      pods.push({ id: i, alive: true, dyingUntil: 0, x, y });
    }

    function drawPod(p) {
      // Each pod is a hex with a label and a state
      const x = p.x, y = p.y;
      const points = [[40,0],[78,22],[78,68],[40,90],[2,68],[2,22]].map(([a,b]) => `${a+x},${b+y}`).join(" ");
      const fill = p.alive ? "#fff5e0" : "#f3ead9";
      const stroke = p.alive ? "#a47c2f" : "#d8cdb8";
      const labelColor = p.alive ? "#2d3a3a" : "#9aa8b2";
      const state = p.alive ? "Running" : (Date.now() < p.dyingUntil ? "Spawning..." : "Dead");
      return `<g style="cursor:${p.alive ? "pointer" : "default"};" data-id="${p.id}">
                <polygon points="${points}" fill="${fill}" stroke="${stroke}" stroke-width="2"/>
                <text x="${x+40}" y="${y+42}" text-anchor="middle" font-family="Inter" font-size="13" fill="${labelColor}" font-weight="500">pod-${p.id+1}</text>
                <text x="${x+40}" y="${y+58}" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="${p.alive ? "#4a9d6a" : "#c45a4e"}">${state}</text>
              </g>`;
    }

    function render() {
      svg.innerHTML = pods.map(drawPod).join("");
      svg.querySelectorAll("g[data-id]").forEach(g => {
        g.addEventListener("click", () => {
          const id = parseInt(g.dataset.id, 10);
          const p = pods[id];
          if (!p.alive) return;
          p.alive = false;
          kills++;
          stage.querySelector("#kills").textContent = String(kills);
          // controller will respawn after ~900 ms — modelling the kubelet detect-and-respawn latency
          p.dyingUntil = Date.now() + 900;
          setTimeout(() => {
            p.alive = true;
            p.dyingUntil = 0;
            render();
          }, 900);
          render();
        });
      });
    }
    render();

    function loop() {
      if (stopLoop) return;
      const aliveCount = pods.filter(p => p.alive).length;
      const now = performance.now();
      if (aliveCount === 0) {
        if (emptyStartedAt === null) emptyStartedAt = now;
        const e = (now - emptyStartedAt) / 1000;
        stage.querySelector("#empty-time").textContent = e.toFixed(1) + "s";
        if (e > bestEmpty) {
          bestEmpty = e;
          stage.querySelector("#best").textContent = bestEmpty.toFixed(1) + "s";
        }
        if (e >= 5) {
          stage.querySelector("#hive-tip").innerHTML =
            "<strong>5 seconds of empty hive!</strong> ...you cheated, didn't you? (Spam-clicking counts.) In real Kubernetes you'd need to take down more than the controller can replace per second — which is exactly the kind of cascading failure the platform is engineered to make difficult.";
        }
      } else {
        if (emptyStartedAt !== null) emptyStartedAt = null;
        stage.querySelector("#empty-time").textContent = "0.0s";
      }
      requestAnimationFrame(loop);
    }
    loop();

    return () => { stopLoop = true; };
  },
});

        s.style.borderLeftColor = "var(--good)";
      } else {
        s.innerHTML = `<strong>Dropping ${drop} requests/sec!</strong> Users are seeing errors. Pods can't be spawned instantly — there's always a delay.`;
        s.style.borderLeftColor = "var(--bad)";
      }
      drawPods(pods);
    }
    drawPods(pods);
    update();

    stage.querySelector("#t-slider").addEventListener("input", e => {
      incoming = parseInt(e.target.value, 10);
      stage.querySelector("#t-readout").textContent = String(incoming);
      update();
    });

    // HPA loop: every 1.5 seconds the autoscaler considers the load
    function hpaTick() {
      const util = incoming / (pods * 100); // target is 0.7
      if (util > 0.7) desiredPods = Math.min(20, Math.ceil(incoming / 70));
      else if (util < 0.3) desiredPods = Math.max(2, Math.ceil(incoming / 70));
      // Move toward desired (1 pod per tick, modelling startup latency)
      if (pods < desiredPods) pods++;
      else if (pods > desiredPods) pods--;
      update();
    }
    const interval = setInterval(hpaTick, 1500);

    // Auto-surge button: ramp the slider over time
    stage.querySelector("#t-auto").addEventListener("click", async () => {
      stage.querySelector("#t-mode").textContent = "auto-surge";
      stage.querySelector("#t-auto").disabled = true;
      for (let r = 100; r <= 2000; r += 30) {
        incoming = r;
        stage.querySelector("#t-slider").value = String(r);
        stage.querySelector("#t-readout").textContent = String(r);
        update();
        await wait(120);
      }
      await wait(2000);
      for (let r = 2000; r >= 100; r -= 30) {
        incoming = r;
        stage.querySelector("#t-slider").value = String(r);
        stage.querySelector("#t-readout").textContent = String(r);
        update();
        await wait(120);
      }
      stage.querySelector("#t-auto").disabled = false;
      stage.querySelector("#t-mode").textContent = "manual";
    });

    return () => { clearInterval(interval); stop = true; };
  },
});

/* ─── 2.5 — GAME: Zero-downtime deploy (rolling update) ─────────────────── */
defineScene({
  chapter: "kubernetes",
  render(root) {
    root.appendChild(el("div", { class: "meta" }, "Chapter II · 5 · A small game"));
    root.appendChild(el("h1", { class: "chapter-title" }, "Deploy without breaking everything"));
    root.appendChild(el("p", { html:
      "You're shipping v2 of your service. The team is watching. <em>Do not</em> have a moment where there are zero pods serving traffic — " +
      "that's an outage. Pick a strategy."
    }));

    const stage = el("div", { class: "stage" });
    let strategy = "rolling"; // rolling | recreate | blue-green
    function renderStrategyButtons() {
      stage.innerHTML = `
        <div style="display:flex; gap:10px; margin-bottom:16px;">
          <button class="${strategy==='recreate'?'':'ghost'}" data-s="recreate">Recreate (all at once)</button>
          <button class="${strategy==='rolling'?'':'ghost'}" data-s="rolling">Rolling update</button>
          <button class="${strategy==='blue-green'?'':'ghost'}" data-s="blue-green">Blue-green</button>
        </div>
        <svg viewBox="0 0 720 200" xmlns="http://www.w3.org/2000/svg" id="deploy-svg"></svg>
        <div class="tip" id="deploy-status" style="margin-top:14px;">Press <b>▶ Run deployment</b> below to start.</div>
        <button id="deploy-run" style="margin-top:14px;">▶ Run deployment</button>
      `;
      stage.querySelectorAll("button[data-s]").forEach(b => {
        b.addEventListener("click", () => { strategy = b.dataset.s; renderStrategyButtons(); });
      });
      stage.querySelector("#deploy-run").addEventListener("click", runDeploy);
    }

    function drawPods(svg, pods) {
      svg.innerHTML = pods.map((p, i) => {
        const x = i * 90 + 50;
        const color = p.alive ? (p.version === "v2" ? "#d4972f" : "#9aa8b2") : "#f3ead9";
        const stroke = p.alive ? "#a47c2f" : "#d8cdb8";
        return `<g transform="translate(${x}, 60)">
          <polygon points="35,0 68,20 68,60 35,80 2,60 2,20" fill="${color}" stroke="${stroke}" stroke-width="2"/>
          <text x="35" y="44" text-anchor="middle" font-family="Inter" font-size="12" font-weight="600" fill="${p.alive ? '#fff' : '#9aa8b2'}">${p.version || '—'}</text>
        </g>`;
      }).join("");
      const aliveCount = pods.filter(p => p.alive).length;
      const v2Count = pods.filter(p => p.alive && p.version === "v2").length;
      svg.innerHTML += `<text x="360" y="170" text-anchor="middle" font-family="Inter" font-size="13" fill="#6b7878">${aliveCount} pods serving · ${v2Count} on v2</text>`;
    }

    async function runDeploy() {
      stage.querySelector("#deploy-run").disabled = true;
      const svg = stage.querySelector("#deploy-svg");
      const status = stage.querySelector("#deploy-status");
      let pods = Array.from({ length: 6 }, () => ({ alive: true, version: "v1" }));
      drawPods(svg, pods);
      let outage = false;

      if (strategy === "recreate") {
        status.innerHTML = "<strong>Recreate:</strong> tear them all down, then bring v2 up. Simple. Brutal.";
        // kill all
        for (let i = 0; i < pods.length; i++) {
          pods[i].alive = false;
          drawPods(svg, pods);
          await wait(220);
        }
        if (pods.every(p => !p.alive)) {
          outage = true;
          status.innerHTML = "<strong>🔥 Outage:</strong> all pods are down. Users are seeing errors.";
          status.style.borderLeftColor = "var(--bad)";
        }
        await wait(1000);
        // bring up v2
        for (let i = 0; i < pods.length; i++) {
          pods[i].alive = true;
          pods[i].version = "v2";
          drawPods(svg, pods);
          await wait(380);
        }
        status.innerHTML += "<br>v2 is up. But there was a <em>~3 second window</em> of total outage. Never do this in production.";

      } else if (strategy === "rolling") {
        status.innerHTML = "<strong>Rolling:</strong> swap pods one at a time. Slow but safe. Default in Kubernetes.";
        for (let i = 0; i < pods.length; i++) {
          // kill old
          pods[i].alive = false; drawPods(svg, pods);
          await wait(260);
          // bring up v2
          pods[i].alive = true; pods[i].version = "v2"; drawPods(svg, pods);
          await wait(320);
          // sanity: never less than 5 alive
          if (pods.filter(p => p.alive).length < pods.length - 1) outage = true;
        }
        status.innerHTML += "<br>" + (outage
          ? "Briefly dipped below the surge buffer."
          : "Throughout the whole deploy, at least 5 of 6 pods were serving traffic. No user noticed.");
        status.style.borderLeftColor = "var(--good)";

      } else if (strategy === "blue-green") {
        status.innerHTML = "<strong>Blue-green:</strong> stand up an entire SECOND fleet on v2, then flip traffic.";
        // Add 6 more pods on v2
        const greenPods = Array.from({ length: 6 }, () => ({ alive: true, version: "v2-warming" }));
        for (let i = 0; i < greenPods.length; i++) {
          const all = pods.concat(greenPods.slice(0, i+1));
          drawPods(svg, all);
          await wait(280);
        }
        await wait(600);
        // Flip: kill all v1 instantly (traffic flip is what kills them)
        status.innerHTML += "<br>Flipping traffic now...";
        await wait(400);
        pods = greenPods.map(p => ({ ...p, version: "v2" }));
        drawPods(svg, pods);
        status.innerHTML = "<strong>Blue-green:</strong> zero-downtime flip. Costliest in resources (you ran 2× pods for a few seconds) but instant rollback if v2 breaks.";
        status.style.borderLeftColor = "var(--good)";
      }
      stage.querySelector("#deploy-run").disabled = false;
    }
    renderStrategyButtons();
    root.appendChild(stage);

    root.appendChild(el("p", { html:
      "<b>Why Kubernetes makes this routine.</b> A few lines of YAML — <code>maxSurge: 1</code>, <code>maxUnavailable: 0</code> — " +
      "and the helmsman handles the whole choreography. Before Kubernetes, this was a person on a 3 AM call with a script and prayer."
    }));
  },
});

/* ─── 2.6 — GAME: Probe Doctor (readiness vs liveness) ──────────────────── */
defineScene({
  chapter: "kubernetes",
  render(root) {
    root.appendChild(el("div", { class: "meta" }, "Chapter II · 6 · A small game"));
    root.appendChild(el("h1", { class: "chapter-title" }, "Diagnose the sick pod"));
    root.appendChild(el("p", { html:
      "Kubernetes asks each pod two questions, periodically: <b>are you alive?</b> (if not, restart) and " +
      "<b>are you ready to serve?</b> (if not, route traffic away). They sound the same. They are not. Misconfiguring " +
      "them is one of the top causes of mysterious outages. Read each symptom and pick the diagnosis."
    }));

    const cases = [
      {
        symptom: "Pod is constantly being restarted. The application logs show 'starting up...' over and over. The startup is slow — it takes 40 seconds to load a large file before the HTTP server starts.",
        choices: [
          { text: "Increase the liveness probe's initialDelaySeconds (or add a startupProbe)", right: true,  why: "The liveness probe is firing during the 40-second startup, declaring the pod 'dead,' triggering a restart, which restarts the 40-second startup. Infinite loop." },
          { text: "Reduce the readiness probe interval", right: false, why: "Wrong probe. Readiness controls traffic; liveness controls restarts." },
          { text: "Delete the deployment and re-create it", right: false, why: "It'll do the exact same thing." },
        ],
      },
      {
        symptom: "Pod is up and stays up — never restarts. But users see errors. Health endpoint returns 500.",
        choices: [
          { text: "Add or fix the readiness probe", right: true, why: "Liveness is happy (the process is running) but the pod isn't actually able to serve. Readiness must be checked on something that fails when the pod can't serve — e.g. a DB ping. When readiness fails, Kubernetes stops sending traffic." },
          { text: "Restart the pod manually", right: false, why: "You can, but it'll just come back broken if the dependency is still down. The right answer is: stop sending it traffic until it's actually ready." },
          { text: "Disable the liveness probe", right: false, why: "Liveness isn't the problem here. Don't poke the wrong thing." },
        ],
      },
      {
        symptom: "Database is briefly slow during a backup. ALL pods get restarted because their /health endpoint touches the DB and times out.",
        choices: [
          { text: "Make liveness check a cheap in-process flag, not a DB call", right: true, why: "Liveness should test 'is THIS process functioning?' — not 'is the whole world OK?'. If the DB blip restarts every pod, you've coupled their lifecycle to the DB's. Use readiness for that." },
          { text: "Raise the liveness timeout to 60 s", right: false, why: "Masks the symptom. The real problem is asking the wrong question in the probe." },
          { text: "Remove the DB call from /health entirely", right: false, why: "Closer, but the nuance: you want SOMETHING that detects 'I can't reach the DB' — but that signal should affect readiness (stop sending traffic), not liveness (kill me)." },
        ],
      },
    ];

    const stage = el("div", { class: "stage" });
    let idx = 0, score = 0;

    function renderCase() {
      stage.innerHTML = "";
      if (idx >= cases.length) {
        stage.appendChild(el("div", { class: "display", style: { fontSize: "20px" } }, `Score: ${score}/${cases.length}`));
        stage.appendChild(el("p", { html:
          "<b>Mental model:</b> liveness asks <em>'should I kill this pod?'</em> and readiness asks <em>'should I send traffic to it?'</em>. " +
          "Confusing the two is the source of about half of all 'why is my service flapping?' incidents."
        }));
        stage.appendChild(el("button", { onclick: () => { idx = 0; score = 0; renderCase(); } }, "Replay"));
        return;
      }
      const c = cases[idx];
      stage.appendChild(el("div", { class: "scoreboard" },
        el("span", {}, `Case ${idx+1} / ${cases.length}`),
        el("span", {}, "Score: ", el("b", {}, String(score)))
      ));
      stage.appendChild(el("div", { class: "story", html: `<strong>Symptom:</strong> ${c.symptom}` }));
      stage.appendChild(el("p", { style: { fontWeight: 600 } }, "Diagnosis:"));
      for (const ch of c.choices) {
        const btn = el("button", { class: "choice" }, ch.text);
        btn.addEventListener("click", () => {
          stage.querySelectorAll(".choice").forEach(b => b.disabled = true);
          btn.classList.add(ch.right ? "correct" : "wrong");
          btn.appendChild(el("span", { class: "why" }, ch.why));
          if (ch.right) score++;
          stage.appendChild(el("button", { style: { marginTop: "12px" }, onclick: () => { idx++; renderCase(); } },
            idx === cases.length - 1 ? "See results" : "Next case →"));
        });
        stage.appendChild(btn);
      }
    }
    renderCase();
    root.appendChild(stage);
  },
});

});

      if (stepIdx >= steps.length) {
        tip.innerHTML = `<strong>Incident contained.</strong> Score: ${score}/${steps.length}.<br>` +
          "<em>The biggest predictor of recovery time isn't how good your tech is — it's how well-rehearsed the runbook is. " +
          "Practice failovers like fire drills.</em>";
        // Visually move traffic
        stage.querySelector("#traffic-label").textContent = "Traffic: 100% to West US 2";
        stage.querySelector("#west-status").textContent = "✓ serving production traffic";
        return;
      }
      const s = steps[stepIdx];
      tip.innerHTML = `<strong>Step ${stepIdx+1}:</strong> ${s.prompt}`;
      for (const c of s.choices) {
        const btn = el("button", { class: "choice" }, c.text);
        btn.addEventListener("click", () => {
          choices.querySelectorAll("button").forEach(b => b.disabled = true);
          btn.classList.add(c.right ? "correct" : "wrong");
          btn.appendChild(el("span", { class: "why" }, c.why));
          if (c.right) score++;
          // Update visual based on step progress
          if (stepIdx === 2 && c.right) {
            stage.querySelector("#traffic-label").textContent = "Traffic: redirecting to West US 2...";
            stage.querySelector("#west-status").textContent = "✓ warming up...";
          }
          choices.appendChild(el("button", { style: { marginTop: "12px" }, onclick: () => { stepIdx++; renderStep(); } },
            stepIdx === steps.length - 1 ? "See outcome" : "Next →"));
        });
        choices.appendChild(btn);
      }
    }
    renderStep();
  },
});
