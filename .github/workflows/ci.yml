# =============================================================================
# CI PIPELINE — Runs on every Pull Request
#
# PURPOSE: Catch bugs before they merge to main. Validates:
#   1. Python linting (ruff) and type checking (mypy) — all 4 services
#   2. Unit tests (pytest) — all 4 services
#   3. Docker build — verifies Dockerfiles are valid
#   4. Terraform validate + format check — all environments
#   5. Kubernetes manifest linting (kubeval)
#   6. Helm chart linting (helm lint)
#
# GITHUB ACTIONS CONCEPTS:
#   Workflow: a YAML file describing automation (this file)
#   Job: a group of steps running on a runner (VM)
#   Step: a single shell command or action
#   Matrix: run the same job for multiple values (e.g., all 4 services)
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ─── Job 1: Lint + Test all Python services ────────────────────────────────
  test-services:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest

    # Matrix: run this job 4 times in parallel, once per service
    strategy:
      fail-fast: false   # Don't cancel other matrix jobs if one fails
      matrix:
        service:
          - api-gateway
          - user-service
          - task-service
          - notification-service

    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: |
          pip install uv
          # Install runtime dependencies
          uv pip install --system -r requirements.txt
          # Install test dependencies from requirements-dev.txt.
          # These are intentionally separate: test tools (pytest, httpx) are
          # never shipped in production images, only in CI.
          uv pip install --system -r requirements-dev.txt
          # Linting tools (pinned to match any local pre-commit hooks)
          uv pip install --system ruff

      - name: Lint with ruff
        run: ruff check app/ --output-format=github

      - name: Format check with ruff
        run: ruff format app/ --check

      - name: Run tests
        # SECURITY FIX: Removed '|| echo' and continue-on-error.
        # The previous pattern silently masked ALL test failures — including
        # security-related tests — meaning broken auth, SQL injection guards,
        # or BOLA checks would never block a merge to main.
        # If there are no tests yet, create a placeholder that actually passes:
        #   mkdir -p tests && echo "def test_placeholder(): pass" > tests/test_placeholder.py
        run: pytest tests/ -v --tb=short

  # ─── Job 2: Docker build validation ───────────────────────────────────────
  docker-build:
    name: Docker build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, user-service, task-service, notification-service]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: false
          tags: ${{ matrix.service }}:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 3: Terraform validation ──────────────────────────────────────────
  terraform-validate:
    name: Terraform validate (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, prod]
    defaults:
      run:
        working-directory: terraform/environments/${{ matrix.env }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive ../../

      - name: Terraform init (local backend for validation only)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  # ─── Job 4: Helm lint ─────────────────────────────────────────────────────
  helm-lint:
    name: Helm lint ${{ matrix.chart }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart: [api-gateway, user-service, task-service, notification-service]
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: "3.14.4"
      - name: Helm lint
        run: helm lint helm/${{ matrix.chart }} --strict
