# =============================================================================
# INFRASTRUCTURE PIPELINE — Runs Terraform plan/apply
#
# WORKFLOW:
#   PR opened     → terraform plan (safe read-only, shows what would change)
#   Merge to main → terraform apply dev (auto, no approval)
#   Manual trigger → terraform apply prod (requires manual approval)
#
# SECURITY CONCEPTS:
#   - Uses GitHub OIDC to authenticate to Azure WITHOUT storing credentials!
#   - Azure Federated Identity + GitHub Actions = no service principal secrets
#   - Environments with required reviewers protect prod from accidental applies
# =============================================================================

name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
  pull_request:
    paths:
      - "terraform/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options: [dev, prod]
      action:
        description: "Terraform action"
        required: true
        type: choice
        options: [plan, apply, destroy]

permissions:
  id-token: write    # Required for OIDC auth to Azure
  contents: read
  pull-requests: write  # To post plan output as PR comment

env:
  TF_VERSION: "1.7.5"
  ARM_USE_OIDC: "true"  # Tell azurerm provider to use OIDC

jobs:
  # ─── Plan job — runs on every PR touching terraform/ ──────────────────────
  terraform-plan:
    name: Terraform Plan (${{ matrix.env }})
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    environment: ${{ matrix.env }}
    strategy:
      matrix:
        env: [dev]   # Only plan dev on PRs for speed

    defaults:
      run:
        working-directory: terraform/environments/${{ matrix.env }}

    steps:
      - uses: actions/checkout@v4

      # OIDC: GitHub gets a short-lived token and exchanges it with Azure AD
      # for an access token. No secrets stored anywhere!
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Post plan output as a PR comment so reviewers can see the diff
      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/environments/${{ matrix.env }}/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n\n... (truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — \`${{ matrix.env }}\`\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

  # ─── Apply dev — runs on merge to main ────────────────────────────────────
  terraform-apply-dev:
    name: Apply Dev Infrastructure
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev
    defaults:
      run:
        working-directory: terraform/environments/dev

    steps:
      - uses: actions/checkout@v4
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        run: terraform init
      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ─── Apply prod — manual only, requires reviewer approval ─────────────────
  terraform-apply-prod:
    name: Apply Prod Infrastructure
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    environment: prod   # GitHub environment with required reviewers configured
    defaults:
      run:
        working-directory: terraform/environments/prod
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PROD }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        run: terraform init
      - name: Terraform Apply (PROD — approved by reviewer)
        run: terraform apply -auto-approve
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_PROD }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
