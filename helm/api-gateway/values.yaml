# values.yaml — default values for the api-gateway chart.
# Override these per environment:
#   helm upgrade --install api-gateway ./helm/api-gateway \
#     --set image.tag=abc1234 \
#     --set replicaCount=3

replicaCount: 2

image:
  repository: ${ACR_LOGIN_SERVER}/api-gateway
  # IfNotPresent: use the cached image if the exact tag exists on the node.
  # With immutable SHA-pinned tags from CI, Always forces a registry roundtrip
  # on every pod restart. If ACR is degraded, Always prevents pods from
  # restarting even though the image is already on the node. Use Always only
  # with mutable tags like 'latest' — which you should never use in production.
  pullPolicy: IfNotPresent
  tag: "latest"   # CI/CD overrides this with the git SHA on every deploy

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

env:
  ENVIRONMENT: production
  USER_SERVICE_URL: "http://user-service:8001"
  TASK_SERVICE_URL: "http://task-service:8002"
  NOTIFICATION_SERVICE_URL: "http://notification-service:8003"

  # Redis URL is wired in at deploy time via the Azure Cache for Redis connection string.
  # Set via: helm upgrade --install api-gateway ./helm/api-gateway --set env.REDIS_URL=$REDIS_URL
  REDIS_URL: ""

  # Comma-separated list of origins the frontend(s) will call this gateway from.
  # MUST be set per environment. The default is an EMPTY string, which makes
  # CORS deny every browser request — safe by default. Override at install
  # time: --set env.ALLOWED_ORIGINS="https://app.example.com,https://admin.example.com"
  ALLOWED_ORIGINS: ""

  # Rate limit budget per client IP per window.
  # General routes: 200 req / 60 s. Auth routes (login/register): 20 / 60 s.
  # These are tighter than the in-code defaults because production assumes a
  # shared Redis bucket across all gateway replicas; the in-code fallback
  # would otherwise multiply by replica count.
  RATE_LIMIT_REQUESTS: "200"
  AUTH_RATE_LIMIT_REQUESTS: "20"


livenessProbe:
  path: /health
  port: 8000
  initialDelaySeconds: 15
  periodSeconds: 30

readinessProbe:
  path: /health/ready
  port: 8000
  initialDelaySeconds: 10
  periodSeconds: 10

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

nodeSelector: {}

tolerations:
  - key: "workload"
    operator: "Equal"
    value: "app"
    effect: "NoSchedule"

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app: api-gateway
