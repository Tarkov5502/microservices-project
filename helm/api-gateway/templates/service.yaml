apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
    # This label is required for the Prometheus ServiceMonitor selector
    # defined in kubernetes/monitoring/monitoring.yaml to auto-discover this service.
    # Without it, Prometheus scrapes nothing regardless of podAnnotations.
    monitoring: "true"
spec:
  selector:
    app: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
  type: {{ .Values.service.type }}
