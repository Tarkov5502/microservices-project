# =============================================================================
# KUBERNETES: RBAC (Role-Based Access Control)
# PURPOSE: Control who/what can do what in the cluster.
#
# WHAT YOU'LL LEARN:
#   - ServiceAccounts (identities for pods — like user accounts for processes)
#   - Roles vs ClusterRoles (namespace-scoped vs cluster-scoped)
#   - RoleBindings (attach a Role to a ServiceAccount)
#   - Principle of least privilege in Kubernetes
# =============================================================================

# ─── ServiceAccounts ─────────────────────────────────────────────────────────
# Every pod should have its own ServiceAccount — NOT use the default one.
# This allows fine-grained permissions per service.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway
  namespace: microservices
  annotations:
    # Workload Identity: replace with output from:
    #   terraform -chdir=terraform/environments/dev output -json | \
    #     jq -r '.workload_identity_client_ids.value["api-gateway"]'
    azure.workload.identity/client-id: "REPLACE_WITH_API_GATEWAY_CLIENT_ID"
labels:
  azure.workload.identity/use: "true"   # Triggers the Workload Identity webhook
automountServiceAccountToken: false

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: user-service
  namespace: microservices
  annotations:
    azure.workload.identity/client-id: "REPLACE_WITH_USER_SERVICE_CLIENT_ID"
labels:
  azure.workload.identity/use: "true"
automountServiceAccountToken: false

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: task-service
  namespace: microservices
  annotations:
    azure.workload.identity/client-id: "REPLACE_WITH_TASK_SERVICE_CLIENT_ID"
labels:
  azure.workload.identity/use: "true"
automountServiceAccountToken: false

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: notification-service
  namespace: microservices
  annotations:
    azure.workload.identity/client-id: "REPLACE_WITH_NOTIFICATION_SERVICE_CLIENT_ID"
labels:
  azure.workload.identity/use: "true"
automountServiceAccountToken: false

---
# ─── Role: read-secrets ───────────────────────────────────────────────────────
# SECURITY: Each service only gets access to the specific secret keys it needs.
# A single "read all secrets" binding violates least privilege — the api-gateway
# shouldn't be able to read the DB password, and the notification-service
# shouldn't be able to read the JWT signing key.
#
# IMPLEMENTATION NOTE: Kubernetes Roles can't scope to individual keys within a
# Secret object — they grant access to the entire Secret resource. The correct
# approach is to create one Secret per service containing only that service's
# credentials, then bind each ServiceAccount to only its own Secret by name.

# api-gateway needs: jwt-secret
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: api-gateway-secrets
  namespace: microservices
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["app-secrets"]  # Scope to the specific Secret object
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]

---
# user-service needs: db-connection-string, redis-connection-string, jwt-secret
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: user-service-secrets
  namespace: microservices
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["app-secrets"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]

---
# task-service needs: db-connection-string, redis-connection-string, sb-sender-connection-string
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: task-service-secrets
  namespace: microservices
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["app-secrets"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]

---
# notification-service needs: sb-listener-connection-string only
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: notification-service-secrets
  namespace: microservices
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["app-secrets"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: api-gateway-secrets
  namespace: microservices
subjects:
  - kind: ServiceAccount
    name: api-gateway
    namespace: microservices
roleRef:
  kind: Role
  name: api-gateway-secrets
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: user-service-secrets
  namespace: microservices
subjects:
  - kind: ServiceAccount
    name: user-service
    namespace: microservices
roleRef:
  kind: Role
  name: user-service-secrets
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: task-service-secrets
  namespace: microservices
subjects:
  - kind: ServiceAccount
    name: task-service
    namespace: microservices
roleRef:
  kind: Role
  name: task-service-secrets
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: notification-service-secrets
  namespace: microservices
subjects:
  - kind: ServiceAccount
    name: notification-service
    namespace: microservices
roleRef:
  kind: Role
  name: notification-service-secrets
  apiGroup: rbac.authorization.k8s.io

---
# ─── ClusterRole: Prometheus scraper ─────────────────────────────────────────
# Prometheus needs cluster-wide read access to discover pods and scrape metrics.
# ClusterRole (vs Role) applies cluster-wide, not just one namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-scraper
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-scraper
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: prometheus-scraper
  apiGroup: rbac.authorization.k8s.io
