# =============================================================================
# KUBERNETES: Ingress
# PURPOSE: Routes external HTTP/HTTPS traffic to the correct Service inside
#          the cluster. The Ingress controller (NGINX) runs as a pod and acts
#          as a reverse proxy.
#
# WHAT YOU'LL LEARN:
#   - Ingress resources vs Ingress controllers
#   - Path-based routing (different URLs → different services)
#   - TLS termination (HTTPS at the edge, HTTP inside the cluster)
#   - cert-manager annotations (auto-issue Let's Encrypt certs)
# =============================================================================

# ─── NGINX Ingress Controller install (via Helm — run this first!) ────────────
# helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
# helm install ingress-nginx ingress-nginx/ingress-nginx \
#   --namespace ingress-nginx --create-namespace \
#   --set controller.service.annotations."service\.beta\.kubernetes\.io/azure-load-balancer-health-probe-request-path"=/healthz

# ─── cert-manager install (auto TLS certs via Let's Encrypt) ─────────────────
# helm repo add jetstack https://charts.jetstack.io
# helm install cert-manager jetstack/cert-manager \
#   --namespace cert-manager --create-namespace \
#   --set installCRDs=true

---
# ClusterIssuer tells cert-manager how to get certificates (Let's Encrypt staging for testing)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: your-email@example.com   # REPLACE with your email
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            class: nginx

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: your-email@example.com   # REPLACE with your email
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx

---
# ─── Main Ingress Resource ────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: microservices-ingress
  namespace: microservices
  annotations:
    # Which ingress controller handles this resource
    kubernetes.io/ingress.class: "nginx"

    # cert-manager: automatically provision and renew TLS certificate
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # NGINX-specific: redirect HTTP → HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # Rate limiting: max 100 requests per second per IP
    nginx.ingress.kubernetes.io/limit-rps: "100"

    # Enable gzip compression
    nginx.ingress.kubernetes.io/enable-gzip: "true"

    # CORS headers (adjust for your frontend domain)
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://your-frontend.example.com"
    nginx.ingress.kubernetes.io/enable-cors: "true"

    # Body size limit (prevent massive payloads)
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

spec:
  tls:
    - hosts:
        - api.your-domain.com   # REPLACE with your domain
      secretName: microservices-tls-secret  # cert-manager will populate this

  rules:
    # All external traffic goes to api-gateway — it handles internal routing
    - host: api.your-domain.com   # REPLACE with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  name: http
