# alembic.ini — Alembic configuration for task-service.
#
# WHY ALEMBIC INSTEAD OF create_all()? (same rationale as user-service)
#   Base.metadata.create_all() creates tables if they don't exist.
#   It does NOTHING when tables already exist — so adding a column after
#   the first deploy silently fails. Alembic versions every change.
#
# TASK-SERVICE SCHEMA:
#   This service owns two tables: projects and tasks.
#   The 'projects' table was added first, then 'tasks' with a FK to projects.
#   Running 'alembic downgrade -1' from migration 002 drops tasks only;
#   from 001 drops projects. This gives you surgical rollback capability.
#
# WORKFLOW:
#   Generate a migration after changing a model:
#     alembic revision --autogenerate -m "add estimated_hours to tasks"
#   Apply all pending migrations:
#     alembic upgrade head
#   Roll back the latest migration:
#     alembic downgrade -1
#   See current schema version:
#     alembic current
#   See full migration history:
#     alembic history --verbose

[alembic]
script_location = alembic
prepend_sys_path = .

# Alembic reads the database URL from the environment variable at runtime
# via env.py — do NOT hardcode credentials here.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
