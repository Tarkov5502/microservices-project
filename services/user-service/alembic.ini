# alembic.ini — Alembic configuration for user-service.
#
# WHY ALEMBIC INSTEAD OF create_all()?
#   Base.metadata.create_all() creates tables if they don't exist.
#   It does NOTHING when tables already exist. So:
#     - First deploy: tables created correctly ✓
#     - Second deploy (added a column): the column silently does NOT get added ✗
#
#   Alembic generates SQL scripts (migrations) that transform the database
#   from one version to the next. Each migration is versioned and tracked,
#   so you always know exactly what state the schema is in.
#
# WORKFLOW:
#   Generate a migration after changing a model:
#     alembic revision --autogenerate -m "add last_seen_at to users"
#   Apply pending migrations:
#     alembic upgrade head
#   Roll back one migration:
#     alembic downgrade -1
#   View current schema version:
#     alembic current

[alembic]
script_location = alembic
prepend_sys_path = .

# Alembic reads the database URL from the environment variable at runtime
# via env.py — do NOT hardcode credentials here.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
